[build]
# Subresource Integrity (SRI) を無効化
integrity = "none"
# 自動 preload を無効化して警告を解消
preload = false
public_url = "/"
dist = "dist"

[serve]
addresses = ["127.0.0.1"]
port = 5003
https = true
tls_key_path = "localhost+2-key.pem"
tls_cert_path = "localhost+2.pem"

[[proxy]]
backend = "http://127.0.0.1:3000/api/"
rewrite = "/api/"

[[hooks]]
# pre_build に変更して、Trunkがアセットを処理する前にCSSを確実に生成する
stage = "pre_build"
command = "sh"
command_arguments = ["-c", "npx @tailwindcss/cli -i input.css -o tailwind.css && sleep 2"]
