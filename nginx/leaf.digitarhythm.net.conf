## Leaf - leaf.digitarhythm.net
## URL構成:
##   /           → index.html (WASM SPA ゲストモードで起動)
##   /login      → index.html (WASM SPA ログイン画面)
##   /about      → about.html (英語版機能紹介ページ)
##   /about_ja   → about_ja.html (日本語版機能紹介ページ)
##   /guide      → guide.html (使い方ガイド)
##   /terms      → terms.html
##   /privacy    → privacy.html
##   /licenses   → licenses.html
##   /api/*      → Node.js バックエンド (port 3000)
##
##   後方互換リダイレクト:
##     /editor      → / (旧エディタURL)
##     /*.html      → 拡張子なしURLへ 301

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name leaf.digitarhythm.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leaf.digitarhythm.net;

    # Let's Encrypt SSL 証明書
    ssl_certificate     /etc/letsencrypt/live/leaf.digitarhythm.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leaf.digitarhythm.net/privkey.pem;

    root  /var/wwws/digitarhythm.net/leaf;

    # Gzip 圧縮
    gzip            on;
    gzip_vary       on;
    gzip_types      text/html text/css application/javascript application/wasm
                    application/json image/svg+xml;

    # ─────────────────────────────────────────────
    # 後方互換: *.html → 拡張子なしURLへリダイレクト
    # ─────────────────────────────────────────────
    location = /about.html     { return 301 /about; }
    location = /about_ja.html  { return 301 /about_ja; }
    location = /guide.html     { return 301 /guide; }
    location = /terms.html     { return 301 /terms; }
    location = /privacy.html   { return 301 /privacy; }
    location = /licenses.html  { return 301 /licenses; }

    # ─────────────────────────────────────────────
    # / → WASM SPA (ゲストモード自動起動)
    # ─────────────────────────────────────────────
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma         "no-cache";
        try_files /index.html =404;
    }

    # ─────────────────────────────────────────────
    # 後方互換: /editor → / にリダイレクト
    # ─────────────────────────────────────────────
    location = /editor { return 301 /; }

    # ─────────────────────────────────────────────
    # /about → about.html (英語版機能紹介ページ)
    # ─────────────────────────────────────────────
    location = /about {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /about.html =404;
    }

    # ─────────────────────────────────────────────
    # 静的ページ (拡張子なし)
    # ─────────────────────────────────────────────
    location = /about_ja {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /about_ja.html =404;
    }

    location = /guide {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /guide.html =404;
    }

    location = /terms {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /terms.html =404;
    }

    location = /privacy {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /privacy.html =404;
    }

    location = /licenses {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /licenses.html =404;
    }

    # ─────────────────────────────────────────────
    # /login → WASM SPA (index.html)
    # ─────────────────────────────────────────────
    location = /login {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma         "no-cache";
        try_files /index.html =404;
    }

    # ─────────────────────────────────────────────
    # API プロキシ → Node.js バックエンド (PM2)
    # ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────
    # Service Worker: キャッシュ無効化
    # ─────────────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma         "no-cache";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────
    # WASM バイナリ: 長期キャッシュ + 正しい MIME
    # ─────────────────────────────────────────────
    location ~* \.wasm$ {
        add_header Content-Type   "application/wasm";
        add_header Cache-Control  "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────
    # JS・CSS: ハッシュ付きファイル名なので長期キャッシュ
    # ─────────────────────────────────────────────
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────
    # その他静的ファイル (画像・アイコン・JSON 等)
    # ─────────────────────────────────────────────
    location / {
        try_files $uri =404;
    }
}
