name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            artifact_name: leaf-macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
            artifact_name: leaf-macos-x86_64
          - platform: windows-latest
            args: ''
            target: ''
            artifact_name: leaf-windows
          - platform: ubuntu-22.04
            args: ''
            target: ''
            artifact_name: leaf-linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Tauri CLI
        run: npm install

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      # Install wasm-opt (binaryen)
      - name: Install wasm-opt (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: brew install binaryen

      - name: Install wasm-opt (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y binaryen

      - name: Install wasm-opt (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm install -g binaryen

      # Build (タグpush時のみリリース作成)
      - name: Build Tauri App (with release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Leaf ${{ github.ref_name }}'
          releaseBody: 'Desktop application release for Leaf ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Build (手動実行時はリリース作成しない)
      - name: Build Tauri App (without release)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # Upload artifacts (手動実行時もダウンロード可能にする)
      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      # タグpush時: 固定ファイル名でリリースアセットを追加アップロード
      - name: Upload fixed-name release asset (macOS aarch64)
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'aarch64-apple-darwin'
        run: |
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" Leaf_aarch64.dmg
          gh release upload ${{ github.ref_name }} Leaf_aarch64.dmg --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload fixed-name release asset (macOS x86_64)
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'x86_64-apple-darwin'
        run: |
          dmg=$(ls src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" Leaf_x64.dmg
          gh release upload ${{ github.ref_name }} Leaf_x64.dmg --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload fixed-name release asset (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $exe.FullName Leaf_x64-setup.exe
          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          Copy-Item $msi.FullName Leaf_x64_en-US.msi
          gh release upload ${{ github.ref_name }} Leaf_x64-setup.exe Leaf_x64_en-US.msi --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload fixed-name release asset (Linux)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'ubuntu-22.04'
        run: |
          appimage=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$appimage" Leaf_amd64.AppImage
          deb=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          cp "$deb" Leaf_amd64.deb
          gh release upload ${{ github.ref_name }} Leaf_amd64.AppImage Leaf_amd64.deb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
