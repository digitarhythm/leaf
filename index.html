  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      var fullMsg = 'ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + ':' + columnNo + '\n' + (error && error.stack ? error.stack : '');
      document.body.innerHTML += '<div style="background:red;color:white;position:absolute;top:0;left:0;z-index:9999;padding:20px;font-family:monospace;">' + fullMsg.replace(/\n/g, '<br>') + '</div>';
      if (window.__TAURI__ && window.__TAURI__.core) {
        window.__TAURI__.core.invoke('log_from_js', { msg: fullMsg }).catch(function (e) { console.error(e) });
      }
      return false;
    };
    window.onunhandledrejection = function (event) {
      var fullMsg = 'UNHANDLED PROMISE REJECTION: ' + (event.reason && event.reason.stack ? event.reason.stack : event.reason);
      document.body.innerHTML += '<div style="background:red;color:white;position:absolute;top:0;left:0;z-index:9999;padding:20px;font-family:monospace;">' + fullMsg.replace(/\n/g, '<br>') + '</div>';
      if (window.__TAURI__ && window.__TAURI__.core) {
        window.__TAURI__.core.invoke('log_from_js', { msg: fullMsg }).catch(function (e) { console.error(e) });
      }
    };
  </script>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background-color: #111827;
      overflow: hidden;
    }

    #root {
      height: 100%;
    }

    /* Windowsブラー効果: blur-activeクラス付与時に全bg-gray-*要素を半透明化 */
    html.blur-active body { background: transparent !important; }
    html.blur-active #app-root { background-color: rgb(3 7 18 / var(--blur-bg-alpha)) !important; }
    html.blur-active .bg-gray-950 { background-color: rgb(3 7 18 / var(--blur-bg-alpha)) !important; }
    html.blur-active .bg-gray-900 { background-color: rgb(17 24 39 / var(--blur-bg-alpha)) !important; }
    html.blur-active .bg-gray-800 { background-color: rgb(31 41 55 / var(--blur-bg-alpha)) !important; }
    html.blur-active .bg-gray-700 { background-color: rgb(55 65 81 / var(--blur-bg-alpha)) !important; }

    /* --- カーソルスタイル修正：Gruvboxテーマ対応版（極限強化） --- */

    /* ノーマル/ビジュアルモード時：ブロックカーソルを維持 */
    .ace_editor.ace-gruvbox.leaf-normal-mode .ace_cursor {
      background-color: #ebdbb2 !important;
      border-left: none !important;
      width: 0.6em !important;
      opacity: 0.6 !important;
      display: block !important;
    }

    /* 【挿入モード時】確実に「縦棒（バー）」にする設定 */
    .ace_editor.ace-gruvbox.leaf-insert-mode .ace_cursor {
      background-color: transparent !important;
      border-left: 2px solid #ebdbb2 !important;
      width: 2px !important;
      opacity: 1 !important;
      display: block !important;
    }

    /* Vim専用の別ブロック要素が存在する場合、挿入モードでは隠す */
    .ace_editor.leaf-insert-mode .ace_cursor-vimmode,
    .ace_editor.leaf-insert-mode .ace_cursor.ace_cursor-vimmode {
      display: none !important;
      opacity: 0 !important;
    }

    /* --- 検索ダイアログのカスタマイズ --- */
    .ace_search {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      z-index: 100 !important;
      background-color: #1f2937 !important;
      /* gray-800 */
      border: 1px solid #374151 !important;
      /* gray-700 */
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
      border-radius: 0.5rem !important;
      /* rounded-lg */
      padding: 1.25rem !important;
      width: auto !important;
      height: auto !important;
      color: #e5e7eb !important;
      /* gray-200 */
      font-family: inherit !important;
    }

    .ace_search_form,
    .ace_replace_form {
      margin-bottom: 0.75rem !important;
      display: flex !important;
      align-items: center !important;
    }

    .ace_search_field {
      background-color: #030712 !important;
      /* gray-950 */
      border: 1px solid #374151 !important;
      /* gray-700 */
      color: #ffffff !important;
      border-radius: 0.375rem !important;
      /* rounded-md */
      padding: 0.4rem 0.75rem !important;
      margin-right: 0.5rem !important;
      outline: none !important;
    }

    .ace_search_field:focus {
      border-color: #10b981 !important;
      /* emerald-500 */
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3) !important;
    }

    .ace_searchbtn {
      background-color: #374151 !important;
      /* gray-700 */
      border: 1px solid #4b5563 !important;
      /* gray-600 */
      color: #d1d5db !important;
      /* gray-300 */
      border-radius: 0.375rem !important;
      padding: 0.25rem 0.75rem !important;
      margin-left: 0.25rem !important;
      cursor: pointer !important;
      transition: all 0.2s !important;
      font-size: 12px !important;
      height: 28px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .ace_searchbtn:hover {
      background-color: #4b5563 !important;
      /* gray-600 */
      color: #ffffff !important;
    }

    .ace_searchbtn.prev,
    .ace_searchbtn.next {
      font-weight: bold !important;
    }

    .ace_search_options {
      margin-top: 0.5rem !important;
      padding-top: 0.5rem !important;
      border-top: 1px solid #374151 !important;
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 0.5rem !important;
    }

    .ace_search_option {
      background-color: #374151 !important;
      border: 1px solid #4b5563 !important;
      color: #9ca3af !important;
      border-radius: 0.25rem !important;
      padding: 0.1rem 0.5rem !important;
      font-size: 10px !important;
      cursor: pointer !important;
    }

    .ace_search_option.checked {
      background-color: #059669 !important;
      /* emerald-600 */
      border-color: #10b981 !important;
      color: #ffffff !important;
    }

    .ace_searchbtn_close {
      position: absolute !important;
      top: 0.5rem !important;
      right: 0.5rem !important;
      color: #9ca3af !important;
      cursor: pointer !important;
      font-size: 18px !important;
      opacity: 0.6 !important;
    }

    .ace_searchbtn_close:hover {
      opacity: 1 !important;
      color: #ffffff !important;
    }

    /* --- */
    /* --- 未保存状態の行番号スタイル --- */
    .leaf-unsaved-gutter .ace_gutter-cell {
      color: #fb923c !important;
      /* orange-400 */
      font-weight: bold !important;
    }

    .leaf-local-gutter .ace_gutter-cell {
      color: #22c55e !important;
      /* green-500 */
      font-weight: bold !important;
    }

    /* --- */
    /* --- Markdown Preview Styling (GitHub Dark Inspired) --- */
    .markdown-body {
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
      color: #f0f6f0;
      border-bottom: 1px solid #30363d;
      padding-bottom: .3em;
    }

    .markdown-body h1 {
      font-size: 2em;
    }

    .markdown-body h2 {
      font-size: 1.5em;
    }

    .markdown-body h3 {
      font-size: 1.25em;
      border-bottom: none;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .markdown-body a {
      color: #58a6ff;
      text-decoration: none;
    }

    .markdown-body a:hover {
      text-decoration: underline;
    }

    .markdown-body code {
      padding: 0.2em 0.4em;
      margin: 0;
      font-size: 85%;
      background-color: rgba(110, 118, 129, 0.4);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
    }

    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #0d1117;
      border-radius: 6px;
      border: 1px solid #30363d;
      margin-bottom: 16px;
    }

    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
      margin: 0;
      font-size: 100%;
      word-break: break-all;
      white-space: pre-wrap;
      border: 0;
    }

    .markdown-body ul {
      padding-left: 2em;
      list-style-type: disc;
    }

    .markdown-body ol {
      padding-left: 2em;
      list-style-type: decimal;
    }

    .markdown-body blockquote {
      padding: 0 1em;
      color: #8b949e;
      border-left: .25em solid #30363d;
      margin: 0 0 16px 0;
    }

    .markdown-body table {
      border-spacing: 0;
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 16px;
      overflow: auto;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid #30363d;
      padding: 6px 13px;
    }

    .markdown-body th {
      background-color: #161b22;
      font-weight: 600;
    }

    .markdown-body tr:nth-child(2n) {
      background-color: #0d1117;
    }

    .markdown-body img {
      max-width: 100%;
      box-sizing: content-box;
      background-color: #0d1117;
    }

    .markdown-body pre,
    .markdown-body code {
      white-space: pre-wrap !important;
      word-break: break-all !important;
      overflow-wrap: break-word !important;
    }

    /* --- */
    /* --- HLJS Container (For code-only files) --- */
    .hljs-container {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      background-color: #1d2021;
      /* Gruvbox Dark background */
    }

    .hljs-container pre.hljs {
      background: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
      white-space: pre-wrap !important;
      word-break: break-all !important;
      overflow-wrap: break-word !important;
      font-size: inherit;
      color: #ebdbb2;
      /* Base text color */
    }

    .hljs-container code.hljs {
      padding: 0 !important;
      background: transparent !important;
    }

    /* --- */
  </style>

  <script>
    // marked/mermaid は遅延ロード（Markdownプレビュー初回使用時）
    window._markedLoaded = false;
    window._mermaidLoaded = false;
    window.ensureMarked = function(callback) {
      if (typeof marked !== 'undefined') { callback(); return; }
      if (window._markedLoaded) { setTimeout(function() { window.ensureMarked(callback); }, 100); return; }
      window._markedLoaded = true;
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
      s.crossOrigin = 'anonymous';
      s.onload = function() {
        if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
          marked.setOptions({
            highlight: function(code, lang) {
              var language = hljs.getLanguage(lang) ? lang : 'plaintext';
              return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
          });
        }
        callback();
      };
      document.head.appendChild(s);
    };
    window.ensureMermaid = function(callback) {
      if (typeof mermaid !== 'undefined') { callback(); return; }
      if (window._mermaidLoaded) { setTimeout(function() { window.ensureMermaid(callback); }, 100); return; }
      window._mermaidLoaded = true;
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
      s.crossOrigin = 'anonymous';
      s.onload = function() {
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        callback();
      };
      document.head.appendChild(s);
    };

    window.initMermaid = function (el) {
      if (!el) return;
      window.ensureMermaid(function() {
        el.querySelectorAll('code.language-mermaid').forEach(function(code) {
          var pre = code.parentElement;
          if (pre && pre.tagName === 'PRE') {
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code.textContent;
            pre.replaceWith(div);
          }
        });
        mermaid.run({ nodes: el.querySelectorAll('.mermaid') });
      });
    };

    if (typeof ace !== 'undefined') {
      ace.config.set("basePath", "https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/");
    }

    // Service Worker 登録 (Tauri環境では無効化)
    if ('serviceWorker' in navigator) {
      if (window.__TAURI__) {
        // Tauri環境: 既存のService Workerを解除
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(reg => {
            reg.unregister();
            console.log('[Leaf] Service Worker unregistered (Tauri mode).');
          });
        });
      } else {
        window.addEventListener('load', () => {
          // サブディレクトリ運用に対応するため相対パスで登録
          navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('[Leaf-PWA] Service Worker registered.', reg.scope);
          }).catch(err => {
            console.error('[Leaf-PWA] Service Worker registration failed:', err);
          });
        });
      }
    }
  </script>
