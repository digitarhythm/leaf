<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaf</title>
    
    <link data-trunk rel="rust" data-target-name="leaf" />
    <link data-trunk rel="css" href="tailwind.css" />
    
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link rel="manifest" href="manifest.json" />
    
    <link data-trunk rel="copy-file" href="editor_interop.js" />
    <link data-trunk rel="copy-file" href="auth.js" />
    <link data-trunk rel="copy-file" href="db.js" />
    <link data-trunk rel="copy-file" href="drive.js" />
    <link data-trunk rel="copy-file" href="icon.svg" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&amp;display=swap" rel="stylesheet" />

    <style>
      html, body { height: 100%; margin: 0; background-color: #111827; overflow: hidden; }
      #root { height: 100%; }
      /* --- カーソルスタイル修正：究極のシンプル版 --- */
      
      /* 標準カーソルを「白いブロック」に設定（デフォルト） */
      .ace_editor .ace_cursor {
        background-color: rgba(255, 255, 255, 0.5) !important;
        border-left: none !important;
        width: 0.6em !important;
        opacity: 1 !important;
      }

      /* Vim専用の追加ブロック要素も「白いブロック」にする */
      .ace_editor .ace_cursor-vimmode {
        background-color: rgba(255, 255, 255, 0.5) !important;
        border: none !important;
        width: 0.6em !important;
      }

      /* 【挿入モード時のみ】標準カーソルを「白い縦棒」に戻す */
      .ace_editor.leaf-insert-mode .ace_cursor {
        border-left: 2px solid #fff !important;
        background-color: transparent !important;
        width: 2px !important;
      }

      /* 挿入モード時はVim用ブロック要素を隠す */
      .ace_editor.leaf-insert-mode .ace_cursor-vimmode {
        opacity: 0 !important;
      }
      /* --- 検索ダイアログのカスタマイズ --- */
      .ace_search {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        z-index: 100 !important;
        background-color: #1f2937 !important; /* gray-800 */
        border: 1px solid #374151 !important; /* gray-700 */
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
        border-radius: 0.5rem !important; /* rounded-lg */
        padding: 1.25rem !important;
        width: auto !important;
        height: auto !important;
        color: #e5e7eb !important; /* gray-200 */
        font-family: inherit !important;
      }
      .ace_search_form, .ace_replace_form {
        margin-bottom: 0.75rem !important;
        display: flex !important;
        align-items: center !important;
      }
      .ace_search_field {
        background-color: #030712 !important; /* gray-950 */
        border: 1px solid #374151 !important; /* gray-700 */
        color: #ffffff !important;
        border-radius: 0.375rem !important; /* rounded-md */
        padding: 0.4rem 0.75rem !important;
        margin-right: 0.5rem !important;
        outline: none !important;
      }
      .ace_search_field:focus {
        border-color: #3b82f6 !important; /* blue-500 */
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3) !important;
      }
      .ace_searchbtn {
        background-color: #374151 !important; /* gray-700 */
        border: 1px solid #4b5563 !important; /* gray-600 */
        color: #d1d5db !important; /* gray-300 */
        border-radius: 0.375rem !important;
        padding: 0.25rem 0.75rem !important;
        margin-left: 0.25rem !important;
        cursor: pointer !important;
        transition: all 0.2s !important;
        font-size: 12px !important;
        height: 28px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      .ace_searchbtn:hover {
        background-color: #4b5563 !important; /* gray-600 */
        color: #ffffff !important;
      }
      .ace_searchbtn.prev, .ace_searchbtn.next {
        font-weight: bold !important;
      }
      .ace_search_options {
        margin-top: 0.5rem !important;
        padding-top: 0.5rem !important;
        border-top: 1px solid #374151 !important;
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 0.5rem !important;
      }
      .ace_search_option {
        background-color: #374151 !important;
        border: 1px solid #4b5563 !important;
        color: #9ca3af !important;
        border-radius: 0.25rem !important;
        padding: 0.1rem 0.5rem !important;
        font-size: 10px !important;
        cursor: pointer !important;
      }
      .ace_search_option.checked {
        background-color: #2563eb !important; /* blue-600 */
        border-color: #3b82f6 !important;
        color: #ffffff !important;
      }
      .ace_searchbtn_close {
        position: absolute !important;
        top: 0.5rem !important;
        right: 0.5rem !important;
        color: #9ca3af !important;
        cursor: pointer !important;
        font-size: 18px !important;
        opacity: 0.6 !important;
      }
      .ace_searchbtn_close:hover {
        opacity: 1 !important;
        color: #ffffff !important;
      }
      /* --- */
      /* --- 未保存状態の行番号スタイル --- */
      .leaf-unsaved-gutter .ace_gutter-cell {
        color: #fb923c !important; /* orange-400 */
        font-weight: bold !important;
      }
      /* --- */
      .markdown-body {
        color: #e5e7eb;
        line-height: 1.6;
        word-wrap: break-word;
      }
      .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #374151; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
      .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #374151; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
      .markdown-body p { margin-top: 0; margin-bottom: 16px; }
      .markdown-body code { padding: 0.2em 0.4em; margin: 0; font-size: 85%; background-color: rgba(255,255,255,0.1); border-radius: 6px; font-family: monospace; }
      .markdown-body pre { padding: 16px; overflow: auto; font-size: 85%; line-height: 1.45; background-color: #1f2937; border-radius: 6px; }
      .markdown-body ul { padding-left: 2em; list-style-type: disc; margin-bottom: 16px; }
      /* --- */
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/theme-twilight.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/mode-text.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-language_tools.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/keybinding-vim.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ startOnLoad: false, theme: 'dark' });
      ace.config.set("basePath", "https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/");
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
