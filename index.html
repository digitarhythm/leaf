  <script>
    // marked/mermaid „ĀĮťĀÖŚĽ∂„É≠„Éľ„ÉČÔľąMarkdown„Éó„É¨„Éď„É•„ÉľŚąĚŚõěšĹŅÁĒ®śôāÔľČ
    window._markedLoaded = false;
    window._mermaidLoaded = false;
    window.ensureMarked = function(callback) {
      if (typeof marked !== 'undefined') { callback(); return; }
      if (window._markedLoaded) { setTimeout(function() { window.ensureMarked(callback); }, 100); return; }
      window._markedLoaded = true;
      var s = document.createElement('script');
      s.src = 'assets/js/marked.min.js';
      s.onload = function() {
        if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
          // marked v5+ŚĮĺŚŅú: renderer.code„āí„ā™„Éľ„Éź„Éľ„É©„ā§„ÉČÔľąv15+„ĀĮtoken object„ÄĀv4„ĀĮstring+lang„ĀßŚĎľ„Āį„āĆ„āčÔľČ
          marked.use({
            renderer: {
              code: function(codeOrToken, lang) {
                var code, language;
                if (typeof codeOrToken === 'object' && codeOrToken !== null) {
                  code = codeOrToken.text;
                  language = codeOrToken.lang || '';
                } else {
                  code = codeOrToken;
                  language = lang || '';
                }
                // ŚÖąť†≠„ĀģÁ©ļÁôĹťô§ŚéĽÔľčÁ©ļÁôĹŚĆļŚąá„āä„ĀģśúÄŚąĚ„Āģ„Éą„Éľ„āĮ„É≥„āíśäĹŚáļ
                language = String(language).trim().split(/\s+/)[0].toLowerCase();
                var escape = function(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); };
                // Mermaid„ĀĮ„ÉŹ„ā§„É©„ā§„Éą„Āõ„Āö„ÄĀlanguage-mermaid„āĮ„É©„āĻ„Āģ„ĀŅšĽė„ĀĎ„Ā¶ŚĺĆśģĶ„ĀģinitMermaid„ĀęŚßĒŤ≠≤
                if (language === 'mermaid') {
                  return '<pre class="mermaid-pre"><code class="language-mermaid">' + escape(code) + '</code></pre>\n';
                }
                var validLang = language && hljs.getLanguage(language) ? language : 'plaintext';
                var result;
                try {
                  result = hljs.highlight(code, { language: validLang }).value;
                } catch (_) {
                  result = escape(code);
                }
                return '<pre><code class="hljs language-' + validLang + '">' + result + '</code></pre>\n';
              }
            }
          });
        }
        callback();
      };
      document.head.appendChild(s);
    };
    window.ensureMermaid = function(callback) {
      if (typeof mermaid !== 'undefined') { callback(); return; }
      if (window._mermaidLoaded) { setTimeout(function() { window.ensureMermaid(callback); }, 100); return; }
      window._mermaidLoaded = true;
      var s = document.createElement('script');
      s.src = 'assets/js/mermaid.min.js';
      s.onload = function() {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'default'
        });
        callback();
      };
      document.head.appendChild(s);
    };

    window.initMermaid = function (el) {
      if (!el) return;
      window.ensureMermaid(function() {
        // code.language-mermaid „Āĺ„Āü„ĀĮ code.hljs.language-mermaid „āíšł°śĖĻś§úŚáļ
        el.querySelectorAll('code.language-mermaid, code.hljs.language-mermaid').forEach(function(code) {
          var pre = code.parentElement;
          if (pre && pre.tagName === 'PRE') {
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code.textContent;
            pre.replaceWith(div);
          }
        });
        var mermaidNodes = Array.from(el.querySelectorAll('.mermaid'));
        if (mermaidNodes.length > 0) {
          try {
            mermaid.run({ nodes: mermaidNodes });
          } catch (err) {
            console.error('[Leaf] Mermaid render error:', err);
          }
        }
      });
    };

    if (typeof ace !== 'undefined') {
      ace.config.set("basePath", "assets/js/ace/");
    }

    // Service Worker ÁôĽťĆ≤ (TauriÁíįŚĘÉ„Āß„ĀĮÁĄ°ŚäĻŚĆĖ)
