<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Petit+Formal+Script&amp;display=swap');
      .leaf-text {
        font-family: 'Petit Formal Script', cursive;
        font-size: 80px;
        fill: white;
        fill-opacity: 0.4;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#166534;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#111827" />
  
  <!-- Leaf Shape -->
  <g filter="url(#shadow)">
    <path d="M256 80 
             C256 80 120 160 120 300 
             C120 420 256 440 256 440 
             C256 440 392 420 392 300 
             C392 160 256 80 256 80 Z" 
          fill="url(#leafGradient)" />
    
    <!-- Vein -->
    <path d="M256 80 L256 440" 
          stroke="#064e3b" 
          stroke-width="4" 
          stroke-linecap="round" 
          opacity="0.3" />
    
    <!-- Detail Curve -->
    <path d="M256 180 C300 220 320 280 256 340" 
          fill="none" 
          stroke="#fff" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.2" />

    <!-- Text Logo Overlay -->
    <text x="256" y="280" class="leaf-text">Leaf</text>
  </g>
</svg>
